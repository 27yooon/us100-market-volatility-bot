services:
  - type: cron
    name: us100-market-signal-bot
    runtime: python
    schedule: "*/5 * * * *"
    buildCommand: "python --version"
    startCommand: "python market_reason_mvp/market_signal_bot.py --once --score-threshold=8 --min-rr=1.30"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
